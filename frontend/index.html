<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技心知识问答台</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        :root {
            --bg: #f4efe6;
            --paper: #fbf8f2;
            --panel: rgba(255, 252, 245, 0.88);
            --line: rgba(92, 72, 43, 0.16);
            --text: #2f2418;
            --muted: #6f6356;
            --accent: #8a4f1d;
            --accent-strong: #68360f;
            --accent-soft: #e7d4bd;
            --success: #2f7a53;
            --error: #b44532;
            --shadow: 0 22px 60px rgba(74, 52, 26, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            height: 100vh;
            overflow: hidden;
            color: var(--text);
            font-family: "Noto Serif SC", "Source Han Serif SC", "PingFang SC", serif;
            background:
                radial-gradient(circle at top left, rgba(214, 184, 146, 0.35), transparent 28%),
                radial-gradient(circle at bottom right, rgba(161, 109, 53, 0.18), transparent 22%),
                linear-gradient(180deg, #f7f1e7 0%, var(--bg) 100%);
        }

        .app-shell {
            width: min(1280px, calc(100vw - 32px));
            margin: 16px auto;
            height: calc(100vh - 32px);
            display: grid;
            grid-template-columns: minmax(0, 1.8fr) minmax(300px, 0.9fr);
            gap: 18px;
        }

        .panel {
            background: var(--panel);
            backdrop-filter: blur(12px);
            border: 1px solid var(--line);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .chat-panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .hero {
            padding: 24px 28px 18px;
            border-bottom: 1px solid var(--line);
            background:
                linear-gradient(135deg, rgba(138, 79, 29, 0.08), rgba(255, 255, 255, 0)),
                linear-gradient(180deg, rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0));
        }

        .eyebrow {
            font-size: 12px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .hero h1 {
            margin: 0;
            font-size: 34px;
            line-height: 1.15;
            font-weight: 600;
        }

        .hero p {
            margin: 12px 0 0;
            max-width: 700px;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.8;
        }

        .toolbar {
            margin-top: 18px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .status-chip,
        .meta-chip,
        .ghost-button,
        .suggestion {
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.55);
        }

        .status-chip,
        .meta-chip {
            padding: 8px 12px;
            font-size: 13px;
            color: var(--muted);
        }

        .status-chip.online {
            color: var(--success);
            border-color: rgba(47, 122, 83, 0.22);
            background: rgba(47, 122, 83, 0.08);
        }

        .status-chip.offline {
            color: var(--error);
            border-color: rgba(180, 69, 50, 0.22);
            background: rgba(180, 69, 50, 0.08);
        }

        .ghost-button {
            padding: 8px 14px;
            cursor: pointer;
            color: var(--text);
            font: inherit;
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .ghost-button:hover {
            transform: translateY(-1px);
            border-color: rgba(138, 79, 29, 0.28);
            background: rgba(255, 255, 255, 0.78);
        }

        .chat-scroll {
            flex: 1;
            overflow: auto;
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            min-height: 0;
            overscroll-behavior: contain;
            scroll-behavior: smooth;
        }

        .empty-state {
            margin: auto 0;
            padding: 24px 8px 8px;
        }

        .empty-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-top: 18px;
        }

        .suggestion {
            text-align: left;
            padding: 16px 18px;
            cursor: pointer;
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
            box-shadow: 0 10px 24px rgba(84, 61, 28, 0.06);
        }

        .suggestion:hover {
            transform: translateY(-2px);
            border-color: rgba(138, 79, 29, 0.24);
        }

        .suggestion strong {
            display: block;
            font-size: 15px;
            margin-bottom: 6px;
            color: var(--text);
        }

        .suggestion span {
            display: block;
            color: var(--muted);
            line-height: 1.6;
            font-size: 13px;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: rise 0.24s ease;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message-meta {
            font-size: 12px;
            color: var(--muted);
            padding: 0 4px;
        }

        .bubble {
            max-width: min(760px, 88%);
            padding: 16px 18px;
            border-radius: 22px;
            line-height: 1.85;
            white-space: pre-wrap;
            word-break: break-word;
            border: 1px solid var(--line);
        }

        .message.user .bubble {
            background: linear-gradient(135deg, #8a4f1d, #6d3912);
            color: #fff8ef;
            border-bottom-right-radius: 8px;
            box-shadow: 0 16px 32px rgba(109, 57, 18, 0.25);
        }

        .message.assistant .bubble {
            background: var(--paper);
            border-bottom-left-radius: 8px;
        }

        .typing {
            display: inline-flex;
            gap: 8px;
            align-items: center;
            padding: 14px 18px;
            border-radius: 20px;
            background: var(--paper);
            border: 1px solid var(--line);
        }

        .typing i {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
            animation: pulse 1.1s infinite ease-in-out;
        }

        .typing i:nth-child(2) {
            animation-delay: 0.15s;
        }

        .typing i:nth-child(3) {
            animation-delay: 0.3s;
        }

        .composer {
            padding: 18px 22px 22px;
            border-top: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0), rgba(255, 253, 249, 0.92));
            position: sticky;
            bottom: 0;
            z-index: 2;
        }

        .composer-box {
            border: 1px solid rgba(138, 79, 29, 0.2);
            background: rgba(255, 255, 255, 0.82);
            border-radius: 22px;
            padding: 14px 14px 12px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .composer-box:focus-within {
            border-color: rgba(138, 79, 29, 0.42);
        }

        .composer textarea {
            width: 100%;
            border: 0;
            background: transparent;
            resize: none;
            outline: none;
            color: var(--text);
            font: inherit;
            min-height: 72px;
            max-height: 220px;
            overflow: auto;
            line-height: 1.8;
        }

        .composer-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }

        .composer-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .testcase-wrap {
            position: relative;
        }

        .testcase-panel {
            position: absolute;
            right: 0;
            bottom: calc(100% + 10px);
            width: min(360px, calc(100vw - 48px));
            padding: 10px;
            border: 1px solid rgba(138, 79, 29, 0.18);
            border-radius: 18px;
            background: rgba(255, 252, 247, 0.98);
            box-shadow: 0 18px 40px rgba(75, 43, 16, 0.12);
            display: grid;
            gap: 8px;
        }

        .testcase-item {
            width: 100%;
            text-align: left;
            border: 0;
            border-radius: 14px;
            padding: 10px 12px;
            background: rgba(138, 79, 29, 0.08);
            color: var(--text);
            cursor: pointer;
            transition: background 160ms ease, transform 160ms ease;
        }

        .testcase-item:hover {
            background: rgba(138, 79, 29, 0.14);
            transform: translateY(-1px);
        }

        .testcase-item strong {
            display: block;
            font-size: 13px;
        }

        .testcase-item span {
            display: block;
            margin-top: 4px;
            color: var(--muted);
            line-height: 1.6;
            font-size: 13px;
        }

        .composer-note {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.6;
        }

        .send-button {
            border: 0;
            border-radius: 999px;
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #fff6eb;
            cursor: pointer;
            font: inherit;
            min-width: 116px;
            box-shadow: 0 14px 26px rgba(104, 54, 15, 0.24);
            transition: transform 0.18s ease, opacity 0.18s ease;
        }

        .send-button:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        .send-button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            box-shadow: none;
        }

        .feature-button {
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.78);
            color: var(--text);
            cursor: pointer;
            font: inherit;
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
        }

        .feature-button:hover {
            transform: translateY(-1px);
            border-color: rgba(138, 79, 29, 0.28);
            background: rgba(255, 255, 255, 0.94);
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 18px;
            min-height: 0;
            overflow: hidden;
        }

        .side-card {
            padding: 22px;
        }

        .side-card:first-child {
            min-height: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .side-card:first-child .context-list {
            min-height: 0;
            overflow: auto;
            padding-right: 4px;
            overscroll-behavior: contain;
        }

        .side-card h2,
        .side-card h3 {
            margin: 0;
            font-size: 18px;
        }

        .side-card p {
            color: var(--muted);
            line-height: 1.75;
            font-size: 14px;
            margin: 12px 0 0;
        }

        .stat-list,
        .context-list {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stat-item,
        .context-item {
            padding: 12px 14px;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.56);
        }

        .stat-item strong,
        .context-item strong {
            display: block;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .stat-item span,
        .context-item span {
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .context-pre {
            max-height: 360px;
            overflow: auto;
        }

        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }

        .tag {
            padding: 7px 10px;
            border-radius: 999px;
            font-size: 12px;
            background: rgba(138, 79, 29, 0.08);
            color: var(--accent-strong);
            border: 1px solid rgba(138, 79, 29, 0.14);
        }

        .error-banner {
            margin: 0 22px;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid rgba(180, 69, 50, 0.18);
            background: rgba(180, 69, 50, 0.08);
            color: var(--error);
            font-size: 13px;
        }

        @keyframes pulse {
            0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
            40% { opacity: 1; transform: translateY(-2px); }
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 1080px) {
            .app-shell {
                grid-template-columns: 1fr;
                height: auto;
                min-height: calc(100vh - 32px);
                overflow: auto;
            }

            body {
                overflow: auto;
                height: auto;
            }

            .composer {
                position: static;
            }
        }

        @media (max-width: 720px) {
            .app-shell {
                width: calc(100vw - 16px);
                margin: 8px auto;
                min-height: calc(100vh - 16px);
            }

            .hero {
                padding: 20px 18px 16px;
            }

            .hero h1 {
                font-size: 28px;
            }

            .chat-scroll,
            .composer,
            .side-card {
                padding-left: 16px;
                padding-right: 16px;
            }

            .empty-grid {
                grid-template-columns: 1fr;
            }

            .bubble {
                max-width: 100%;
            }

            .composer-footer {
                align-items: flex-start;
                flex-direction: column;
            }

            .send-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const { createApp, nextTick } = Vue;

        createApp({
            data() {
                return {
                    backendUrl: (window.location.protocol === 'http:' || window.location.protocol === 'https:') ? window.location.origin : "http://localhost:8765",
                    input: "",
                    loading: false,
                    status: "checking",
                    statusText: "正在检查后端服务",
                    messages: [],
                    lastContext: "",
                    lastProvider: "",
                    lastModel: "",
                    lastQuestion: "",
                    lastRetrievalQuery: "",
                    lastTopicType: "",
                    lastTopicSubject: "",
                    lastUpdatedAt: "",
                    errorMessage: "",
                    showTestcasePanel: false,
                    suggestions: [
                        {
                            title: "作者查询",
                            text: "灵视的作者是谁？",
                        },
                        {
                            title: "理念背景",
                            text: "这个作品有什么背景理念？",
                        },
                        {
                            title: "展品信息问答",
                            text: "这个作品的设计作者是谁？它属于哪个展区？",
                        },
                        {
                            title: "技术特点追问",
                            text: "这个作品最值得关注的技术特点是什么？",
                        },
                        {
                            title: "创作背景理解",
                            text: "这个作品的设计动机和灵感来源分别是什么？",
                        },
                        {
                            title: "面向观众解释",
                            text: "请用更容易理解的方式介绍这个作品的核心价值。",
                        },
                    ],
                    testCases: [
                        {
                            title: "作者查询",
                            text: "灵视的作者是谁？",
                        },
                        {
                            title: "理念追问",
                            text: "这个作品有什么设计理念？",
                        },
                        {
                            title: "技术特点",
                            text: "这个作品最值得关注的技术特点是什么？",
                        },
                        {
                            title: "实用推荐",
                            text: "请从知识库里推荐一个比较实用的作品，并说说为什么。",
                        },
                        {
                            title: "通俗介绍",
                            text: "请用更容易理解的方式介绍灵视。",
                        },
                    ],
                };
            },
            computed: {
                statusClass() {
                    if (this.status === "online") return "status-chip online";
                    if (this.status === "offline") return "status-chip offline";
                    return "status-chip";
                },
                canSend() {
                    return !this.loading && this.input.trim().length > 0;
                },
                contextPreview() {
                    if (!this.lastContext) {
                        return "本轮问答的 RAG 检索上下文会显示在这里，便于观察回答依据。";
                    }
                    return this.lastContext;
                },
            },
            mounted() {
                this.checkStatus();
                this.statusTimer = window.setInterval(this.checkStatus, 30000);
                this.$nextTick(() => {
                    if (this.$refs.questionInput) {
                        this.$refs.questionInput.focus();
                    }
                });
            },
            beforeUnmount() {
                if (this.statusTimer) {
                    window.clearInterval(this.statusTimer);
                }
            },
            methods: {
                resizeTextarea() {
                    const el = this.$refs.questionInput;
                    if (!el) return;
                    el.style.height = "auto";
                    el.style.height = Math.min(el.scrollHeight, 260) + "px";
                },
                async checkStatus() {
                    const controller = new AbortController();
                    const timeoutId = window.setTimeout(() => controller.abort(), 5000);

                    try {
                        const response = await fetch(`${this.backendUrl}/status`, {
                            method: "GET",
                            signal: controller.signal,
                        });
                        if (!response.ok) {
                            throw new Error(`HTTP ${response.status}`);
                        }
                        this.status = "online";
                        this.statusText = "知识问答服务在线";
                    } catch (error) {
                        this.status = "offline";
                        this.statusText = "无法连接后端服务";
                    } finally {
                        window.clearTimeout(timeoutId);
                    }
                },
                insertSuggestion(text) {
                    this.input = text;
                    this.showTestcasePanel = false;
                    this.$nextTick(() => {
                        this.resizeTextarea();
                        this.$refs.questionInput?.focus();
                    });
                },
                toggleTestcasePanel() {
                    this.showTestcasePanel = !this.showTestcasePanel;
                },
                chooseRandomTestcase() {
                    if (!this.testCases.length) return;
                    const randomIndex = Math.floor(Math.random() * this.testCases.length);
                    this.insertSuggestion(this.testCases[randomIndex].text);
                },
                clearConversation() {
                    this.messages = [];
                    this.lastContext = "";
                    this.lastProvider = "";
                    this.lastModel = "";
                    this.lastQuestion = "";
                    this.lastRetrievalQuery = "";
                    this.lastTopicType = "";
                    this.lastTopicSubject = "";
                    this.lastUpdatedAt = "";
                    this.errorMessage = "";
                    this.showTestcasePanel = false;
                    this.input = "";
                    this.$nextTick(() => {
                        this.resizeTextarea();
                        this.scrollToBottom(true);
                        this.$refs.questionInput?.focus();
                    });
                },
                buildHistoryPayload() {
                    return this.messages
                        .filter(item => item && item.content)
                        .slice(-8)
                        .map(item => ({
                            role: item.role === "assistant" ? "assistant" : "user",
                            content: item.content,
                        }));
                    },
                    showComingSoon(feature) {
                        window.alert(`${feature} 功能敬请期待`);
                    },
                    async sendQuestion() {
                    const question = this.input.trim();
                    if (!question || this.loading) return;

                    this.errorMessage = "";
                    const historyPayload = this.buildHistoryPayload();
                    this.messages.push({
                        role: "user",
                        content: question,
                        time: this.formatNow(),
                    });

                    this.input = "";
                    this.loading = true;
                    this.$nextTick(() => {
                        this.resizeTextarea();
                        this.scrollToBottom();
                    });

                    const formData = new FormData();
                    formData.append("question", question);
                    if (historyPayload.length > 0) {
                        formData.append("history", JSON.stringify(historyPayload));
                    }

                    try {
                        const response = await fetch(`${this.backendUrl}/chat`, {
                            method: "POST",
                            body: formData,
                        });
                        if (!response.ok) {
                            throw new Error(`HTTP ${response.status}`);
                        }

                        const payload = await response.json();
                        if (payload.status !== "success") {
                            throw new Error(payload.message || "后端返回异常");
                        }

                        const answer = payload.data?.answer || "后端已返回，但没有生成可展示的回答。";
                        this.lastContext = payload.data?.context || "";
                        this.lastProvider = payload.data?.provider || "";
                        this.lastModel = payload.data?.model_name || "";
                        this.lastQuestion = question;
                        this.lastRetrievalQuery = payload.data?.retrieval_query || "";
                        this.lastTopicType = payload.data?.topic_type || "";
                        this.lastTopicSubject = payload.data?.topic_subject || "";
                        this.lastUpdatedAt = this.formatNow();

                        this.messages.push({
                            role: "assistant",
                            content: answer,
                            time: this.lastUpdatedAt,
                        });

                        this.status = "online";
                        this.statusText = "知识问答服务在线";
                        this.$nextTick(() => {
                            this.scrollToBottom(true);
                        });
                    } catch (error) {
                        this.errorMessage = `请求失败：${error.message}`;
                        this.messages.push({
                            role: "assistant",
                            content: "这次没有成功拿到回答。请确认后端服务和 DeepSeek 配置可用后再重试。",
                            time: this.formatNow(),
                        });
                        this.status = "offline";
                        this.statusText = "请求失败";
                    } finally {
                        this.loading = false;
                        this.$nextTick(() => {
                            this.scrollToBottom(true);
                            this.$refs.questionInput?.focus();
                        });
                    }
                },
                onEnter(event) {
                    if (event.key === "Enter" && !event.shiftKey) {
                        event.preventDefault();
                        this.sendQuestion();
                    }
                },
                formatNow() {
                    return new Date().toLocaleTimeString("zh-CN", {
                        hour: "2-digit",
                        minute: "2-digit",
                    });
                },
                scrollToBottom(force = false) {
                    nextTick(() => {
                        const el = this.$refs.chatScroll;
                        if (el) {
                            const distanceFromBottom = el.scrollHeight - el.scrollTop - el.clientHeight;
                            if (!force && distanceFromBottom > 120) {
                                return;
                            }
                            el.scrollTop = el.scrollHeight;
                        }
                    });
                },
            },
            template: `
                <div class="app-shell">
                    <section class="panel chat-panel">
                        <header class="hero">
                            <div class="eyebrow">VL-RAG-System / Knowledge QA</div>
                            <h1>技心知识问答台</h1>
                            <p>
                                这个界面围绕当前项目已实现的 RAG 能力重写。
                                前端负责稳定提问与结果展示，后端负责检索展品知识并调用大模型生成回答。
                            </p>

                            <div class="toolbar">
                                <div :class="statusClass">{{ statusText }}</div>
                                <div class="meta-chip">当前模式：知识问答</div>
                                <button class="ghost-button" @click="checkStatus">刷新状态</button>
                                <button class="ghost-button" @click="clearConversation">清空对话</button>
                                <a class="ghost-button" href="/memory-test" style="text-decoration:none;">记忆系统测试台 →</a>
                            </div>
                        </header>

                        <div v-if="errorMessage" class="error-banner">
                            {{ errorMessage }}
                        </div>

                        <main ref="chatScroll" class="chat-scroll">
                            <div v-if="messages.length === 0" class="empty-state">
                                <h2 style="margin:0;font-size:24px;">从展品知识开始提问</h2>
                                <p style="margin:10px 0 0;color:var(--muted);line-height:1.8;">
                                    建议优先问作品名称、设计作者、展区、技术特点、设计动机、灵感来源等问题。
                                    当前版本默认走 RAG 检索 + DeepSeek API。
                                </p>
                                <div class="empty-grid">
                                    <button
                                        v-for="item in suggestions"
                                        :key="item.title"
                                        class="suggestion"
                                        @click="insertSuggestion(item.text)"
                                    >
                                        <strong>{{ item.title }}</strong>
                                        <span>{{ item.text }}</span>
                                    </button>
                                </div>
                            </div>

                            <template v-else>
                                <article
                                    v-for="(message, index) in messages"
                                    :key="index"
                                    class="message"
                                    :class="message.role"
                                >
                                    <div class="message-meta">
                                        {{ message.role === 'user' ? '提问' : '技心' }} · {{ message.time }}
                                    </div>
                                    <div class="bubble">{{ message.content }}</div>
                                </article>

                                <article v-if="loading" class="message assistant">
                                    <div class="message-meta">技心 · 生成中</div>
                                    <div class="typing"><i></i><i></i><i></i></div>
                                </article>
                            </template>
                        </main>

                        <footer class="composer">
                            <div class="composer-box">
                                <textarea
                                    ref="questionInput"
                                    v-model="input"
                                    @input="resizeTextarea"
                                    @keydown="onEnter"
                                    placeholder="请输入关于展品、作者、展区、设计背景、技术特点等问题。按 Enter 发送，Shift + Enter 换行。"
                                ></textarea>
                                <div class="composer-footer">
                                    <div class="composer-note">
                                        回答来自当前项目的知识库检索与大模型生成结果。若后端未配置 DeepSeek Key，请先设置 DEEPSEEK_API_KEY。
                                    </div>
                    <div class="composer-actions">
                        <div class="testcase-wrap">
                            <button class="feature-button" type="button" @click="toggleTestcasePanel">
                                测试问题
                            </button>
                            <div v-if="showTestcasePanel" class="testcase-panel">
                                <button class="testcase-item" type="button" @click="chooseRandomTestcase()">
                                    <strong>随机来一个</strong>
                                    <span>从预设测试案例里随机选一条填入输入框</span>
                                </button>
                                <button
                                    v-for="item in testCases"
                                    :key="item.title + item.text"
                                    class="testcase-item"
                                    type="button"
                                    @click="insertSuggestion(item.text)"
                                >
                                    <strong>{{ item.title }}</strong>
                                    <span>{{ item.text }}</span>
                                </button>
                            </div>
                        </div>
                        <button class="feature-button" type="button" @click="showComingSoon('ASR')">
                            ASR
                        </button>
                                        <button class="feature-button" type="button" @click="showComingSoon('TTS')">
                                            TTS
                                        </button>
                                        <button class="send-button" :disabled="!canSend" @click="sendQuestion">
                                            {{ loading ? '检索中...' : '发送问题' }}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </footer>
                    </section>

                    <aside class="side-panel">
                        <section class="panel side-card">
                            <h2>本轮检索上下文</h2>
                            <p>
                                这里显示后端本轮问答注入给大模型的 RAG 上下文，便于排查“为什么这样回答”。
                            </p>
                            <div class="context-list">
                                <div class="context-item">
                                    <strong>当前话题类型</strong>
                                    <span>{{ lastTopicType || '尚未发起提问' }}</span>
                                </div>
                                <div class="context-item">
                                    <strong>当前话题对象</strong>
                                    <span>{{ lastTopicSubject || '尚未识别' }}</span>
                                </div>
                                <div class="context-item">
                                    <strong>当前问题</strong>
                                    <span>{{ lastQuestion || '尚未发起提问' }}</span>
                                </div>
                                <div class="context-item">
                                    <strong>实际检索 Query</strong>
                                    <span>{{ lastRetrievalQuery || '尚未发起提问' }}</span>
                                </div>
                                <div class="context-item">
                                    <strong>检索内容</strong>
                                    <span class="context-pre">{{ contextPreview }}</span>
                                </div>
                            </div>
                        </section>

                        <section class="panel side-card">
                            <h3>服务状态</h3>
                            <div class="stat-list">
                                <div class="stat-item">
                                    <strong>后端地址</strong>
                                    <span>{{ backendUrl }}</span>
                                </div>
                                <div class="stat-item">
                                    <strong>路由状态</strong>
                                    <span>{{ lastTopicType ? (lastTopicType + (lastTopicSubject ? ' / ' + lastTopicSubject : '')) : '等待首轮回答' }}</span>
                                </div>
                                <div class="stat-item">
                                    <strong>模型提供方</strong>
                                    <span>{{ lastProvider || '等待首轮回答' }}</span>
                                </div>
                                <div class="stat-item">
                                    <strong>模型名称</strong>
                                    <span>{{ lastModel || '等待首轮回答' }}</span>
                                </div>
                                <div class="stat-item">
                                    <strong>最近更新时间</strong>
                                    <span>{{ lastUpdatedAt || '暂无' }}</span>
                                </div>
                            </div>
                            <div class="tag-row">
                                <span class="tag">HTML + Vue 3</span>
                                <span class="tag">RAG 问答</span>
                                <span class="tag">DeepSeek API</span>
                            </div>
                        </section>
                    </aside>
                </div>
            `,
        }).mount("#app");
    </script>
</body>
</html>
