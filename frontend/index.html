<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多模态问答助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部新话题按钮 */
        .header {
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .new-chat-btn {
            background: none;
            border: 1px solid #1a73e8;
            color: #1a73e8;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

            .new-chat-btn:hover {
                background-color: #f8f9fa;
            }

        .status-indicator {
            font-size: 14px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ccc;
        }

            .status-dot.online {
                background-color: #4caf50;
                animation: pulse 2s infinite;
            }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            transition: all 0.3s ease;
        }

            .main-content.input-at-top {
                justify-content: center;
                align-items: center;
            }

            .main-content.input-at-bottom {
                justify-content: space-between;
                padding-top: 20px;
            }

        /* 介绍文字 */
        .intro-section {
            text-align: center;
            margin-bottom: 40px;
            max-width: 600px;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

            .intro-section.hidden {
                opacity: 0;
                pointer-events: none;
                height: 0;
                margin: 0;
            }

        .intro-title {
            font-size: 28px;
            font-weight: 300;
            color: #202124;
            margin-bottom: 16px;
        }

        .intro-subtitle {
            font-size: 16px;
            color: #5f6368;
            line-height: 1.6;
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            overflow-y: auto;
            padding: 20px 0;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

            .chat-container.hidden {
                opacity: 0;
                pointer-events: none;
            }

        .message {
            margin-bottom: 24px;
            padding: 0 20px;
            animation: fadeIn 0.3s ease-out;
        }

            .message.user {
                text-align: right;
            }

            .message.bot {
                text-align: left;
            }

        .message-content {
            display: inline-block;
            max-width: 70%;
            text-align: left;
        }

        .user .message-content {
            background-color: #1a73e8;
            color: white;
            padding: 12px 16px;
            border-radius: 18px 18px 4px 18px;
        }

        .bot .message-content {
            background-color: #f8f9fa;
            color: #202124;
            padding: 12px 16px;
            border-radius: 18px 18px 18px 4px;
            border: 1px solid #f0f0f0;
        }

        /* 加载指示器 */
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            background-color: #f8f9fa;
            border-radius: 18px 18px 18px 4px;
            border: 1px solid #f0f0f0;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #9aa0a6;
            animation: typing 1.4s infinite ease-in-out;
        }

            .typing-dot:nth-child(1) {
                animation-delay: -0.32s;
            }

            .typing-dot:nth-child(2) {
                animation-delay: -0.16s;
            }

        @keyframes typing {
            0%, 80%, 100% {
                transform: scale(0.8);
                opacity: 0.5;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* 输入框区域 */
        .input-section {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .input-container {
            position: relative;
            border: 2px solid #1a73e8;
            border-radius: 24px;
            background-color: white;
            box-shadow: 0 2px 10px rgba(26, 115, 232, 0.1);
            transition: all 0.3s ease;
        }

            .input-container:focus-within {
                box-shadow: 0 4px 20px rgba(26, 115, 232, 0.2);
            }

        .input-wrapper {
            display: flex;
            align-items: center;
            padding: 4px;
        }

        textarea {
            flex: 1;
            border: none;
            outline: none;
            padding: 16px 20px;
            font-size: 16px;
            resize: none;
            max-height: 200px;
            min-height: 56px;
            background: transparent;
            color: #202124;
        }

            textarea::placeholder {
                color: #9aa0a6;
            }

        .send-button {
            background-color: #1a73e8;
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            margin-right: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

            .send-button:hover:not(:disabled) {
                background-color: #1557b0;
                transform: scale(1.05);
            }

            .send-button:disabled {
                background-color: #c2e7ff;
                cursor: not-allowed;
                transform: none;
            }

        .file-upload-btn {
            background: none;
            border: none;
            color: #5f6368;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 8px;
            transition: all 0.2s;
        }

            .file-upload-btn:hover {
                background-color: #f8f9fa;
                color: #1a73e8;
            }

        /* 文件预览 */
        .file-preview {
            padding: 8px 20px 16px;
            border-top: 1px solid #f0f0f0;
            display: none;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #5f6368;
            font-size: 14px;
        }

        .remove-file {
            color: #dc3545;
            cursor: pointer;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 4px;
        }

            .remove-file:hover {
                background-color: #ffeef0;
            }

        /* 动画效果 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .main-content {
                padding: 20px 16px;
            }

            .intro-title {
                font-size: 24px;
            }

            .message-content {
                max-width: 85%;
            }

            .input-section {
                padding: 0 16px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- 顶部新话题按钮 -->
    <div class="header">
        <button class="new-chat-btn" id="newChatBtn">
            <i class="fas fa-plus"></i>
            新话题
        </button>
        <div class="status-indicator">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">检查连接中...</span>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content input-at-top" id="mainContent">
        <!-- 介绍文字（只在初始状态显示） -->
        <div class="intro-section" id="introSection">
            <h1 class="intro-title">多模态问答助手</h1>
            <p class="intro-subtitle">
                基于 Qwen2-VL-7B 多模态模型与本地知识库<br>
                支持文字输入和图片上传，为您提供准确、及时的问答服务
            </p>
        </div>

        <!-- 聊天记录容器 -->
        <div class="chat-container hidden" id="chatContainer"></div>

        <!-- 输入框区域 -->
        <div class="input-section">
            <div class="input-container">
                <div class="input-wrapper">
                    <button class="file-upload-btn" id="fileUploadBtn" title="上传图片">
                        <i class="fas fa-image"></i>
                    </button>
                    <textarea id="textInput"
                              placeholder="请输入您的问题..."
                              rows="1"></textarea>
                    <button class="send-button" id="sendButton">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="file-preview" id="filePreview">
                    <div class="file-info">
                        <span id="fileName"></span>
                        <span class="remove-file" id="removeFile">移除</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="imageUpload" accept="image/*" style="display: none;">

    <script>
        // 配置
        const BACKEND_URL = 'http://localhost:8000';  // 后端地址
        const MAX_RETRIES = 3;  // 最大重试次数
        const TIMEOUT = 120000;  // 30秒超时

        // DOM元素
        const mainContent = document.getElementById('mainContent');
        const introSection = document.getElementById('introSection');
        const chatContainer = document.getElementById('chatContainer');
        const textInput = document.getElementById('textInput');
        const sendButton = document.getElementById('sendButton');
        const fileUploadBtn = document.getElementById('fileUploadBtn');
        const imageUpload = document.getElementById('imageUpload');
        const filePreview = document.getElementById('filePreview');
        const fileName = document.getElementById('fileName');
        const removeFile = document.getElementById('removeFile');
        const newChatBtn = document.getElementById('newChatBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        let selectedImage = null;
        let hasMessages = false;
        let currentRequestController = null;

        // 检查后端连接状态
        async function checkBackendStatus() {
            try {
                // 尝试访问后端状态接口或根路径
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);

                const response = await fetch(`${BACKEND_URL}/`, {
                    method: 'GET',
                    signal: controller.signal
                }).finally(() => clearTimeout(timeoutId));

                if (response.status !== 404) {
                    updateStatus('online', '服务在线');
                    return true;
                }

                // 尝试 /status 接口
                const response2 = await fetch(`${BACKEND_URL}/status`, {
                    method: 'GET',
                    signal: controller.signal
                }).finally(() => clearTimeout(timeoutId));

                if (response2.ok) {
                    updateStatus('online', '服务在线');
                    return true;
                }

                updateStatus('offline', '服务离线');
                return false;

            } catch (error) {
                console.log('后端连接检查失败:', error.message);
                updateStatus('offline', '服务离线');
                return false;
            }
        }

        // 更新状态显示
        function updateStatus(status, message) {
            statusDot.className = 'status-dot ' + (status === 'online' ? 'online' : '');
            statusText.textContent = message;
        }

        // 自动调整输入框高度
        textInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        // 上传图片
        fileUploadBtn.addEventListener('click', () => {
            imageUpload.click();
        });

        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                selectedImage = file;
                fileName.textContent = file.name;
                filePreview.style.display = 'block';

                // 调整输入框容器样式
                const inputContainer = document.querySelector('.input-container');
                inputContainer.style.borderRadius = '24px 24px 12px 12px';
            } else if (file) {
                alert('请选择图片文件 (JPG, PNG, GIF等)');
            }
        });

        // 移除文件
        removeFile.addEventListener('click', () => {
            selectedImage = null;
            imageUpload.value = '';
            filePreview.style.display = 'none';
            fileName.textContent = '';

            // 恢复输入框容器样式
            const inputContainer = document.querySelector('.input-container');
            inputContainer.style.borderRadius = '24px';
        });

        // 添加消息到聊天区域
        function addMessage(content, image, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            if (image) {
                const imgInfo = document.createElement('div');
                imgInfo.innerHTML = `<strong>📎 图片附件:</strong> ${image.name}`;
                imgInfo.style.marginBottom = '8px';
                imgInfo.style.fontSize = '14px';
                contentDiv.appendChild(imgInfo);

                const reader = new FileReader();
                reader.onload = function (event) {
                    const img = document.createElement('img');
                    img.src = event.target.result;
                    img.alt = '上传的图片';
                    img.style.maxWidth = '200px';
                    img.style.borderRadius = '8px';
                    img.style.marginTop = '8px';
                    contentDiv.appendChild(img);
                };
                reader.readAsDataURL(image);
            }

            if (content) {
                const text = document.createElement('div');
                text.innerHTML = content.replace(/\n/g, '<br>');
                contentDiv.appendChild(text);
            }

            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);

            // 滚动到底部
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // 如果有消息，调整布局
            if (!hasMessages) {
                hasMessages = true;
                mainContent.classList.remove('input-at-top');
                mainContent.classList.add('input-at-bottom');
                introSection.classList.add('hidden');
                chatContainer.classList.remove('hidden');
            }
        }

        // 显示AI正在输入
        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typingIndicator';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'typing-indicator';

            for (let i = 0; i < 3; i++) {
                const dot = document.createElement('div');
                dot.className = 'typing-dot';
                contentDiv.appendChild(dot);
            }

            typingDiv.appendChild(contentDiv);
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 移除正在输入指示器
        function removeTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        // 发送消息到后端
        async function sendMessage() {
            const question = textInput.value.trim();
            if (!question && !selectedImage) {
                alert('请输入问题或选择图片');
                return;
            }

            if (sendButton.disabled) return;

            // 禁用发送按钮
            sendButton.disabled = true;

            // 取消之前的请求（如果有）
            if (currentRequestController) {
                currentRequestController.abort();
            }

            // 添加用户消息
            addMessage(question, selectedImage, true);

            // 保存图片引用（用于清除）
            const currentImage = selectedImage;

            // 清除输入
            textInput.value = '';
            textInput.style.height = 'auto';

            // 清除文件选择（但保留图片数据用于发送）
            imageUpload.value = '';
            filePreview.style.display = 'none';
            fileName.textContent = '';
            const inputContainer = document.querySelector('.input-container');
            inputContainer.style.borderRadius = '24px';

            // 显示正在输入
            showTypingIndicator();

            let retries = 0;
            let success = false;

            // 重试机制
            while (retries < MAX_RETRIES && !success) {
                try {
                    currentRequestController = new AbortController();
                    const timeoutId = setTimeout(() => currentRequestController.abort(), TIMEOUT);

                    // 准备表单数据
                    const formData = new FormData();
                    if (question) formData.append('question', question);
                    if (currentImage) formData.append('image', currentImage);

                    // 发送到后端
                    const response = await fetch(`${BACKEND_URL}/chat`, {
                        method: 'POST',
                        body: formData,
                        signal: currentRequestController.signal
                    }).finally(() => clearTimeout(timeoutId));

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const data = await response.json();

                    // 移除打字指示器
                    removeTypingIndicator();

                    // 添加AI回复
                    if (data.data.answer) {
                        addMessage(data.data.answer, null, false);
                    } else {
                        addMessage('收到回复但内容为空', null, false);
                    }

                    success = true;
                    updateStatus('online', '服务在线');

                } catch (error) {
                    retries++;

                    if (error.name === 'AbortError') {
                        // 超时或手动取消
                        if (retries < MAX_RETRIES) {
                            console.log(`请求超时，重试 ${retries}/${MAX_RETRIES}...`);
                            continue;
                        }
                        removeTypingIndicator();
                        addMessage('请求超时，请稍后重试', null, false);

                    } else if (error.name === 'TypeError' && error.message.includes('fetch')) {
                        // 网络错误
                        if (retries < MAX_RETRIES) {
                            console.log(`网络错误，重试 ${retries}/${MAX_RETRIES}...`);
                            await new Promise(resolve => setTimeout(resolve, 1000 * retries));
                            continue;
                        }
                        removeTypingIndicator();
                        addMessage(`无法连接到后端服务器\n请检查：\n1. 后端是否运行在 ${BACKEND_URL}\n2. 网络连接是否正常`, null, false);
                        updateStatus('offline', '连接失败');

                    } else {
                        // 其他错误
                        removeTypingIndicator();
                        addMessage(`请求失败: ${error.message}`, null, false);
                        updateStatus('offline', '服务异常');
                    }
                }
            }

            // 重置状态
            sendButton.disabled = false;
            textInput.focus();
            currentRequestController = null;
            selectedImage = null;
        }

        // 新话题功能
        function newChat() {
            if (hasMessages) {
                if (confirm('确定要开始新话题吗？当前对话将被清空。')) {
                    // 清空聊天记录
                    chatContainer.innerHTML = '';

                    // 重置状态
                    hasMessages = false;
                    selectedImage = null;
                    imageUpload.value = '';
                    textInput.value = '';
                    textInput.style.height = 'auto';
                    filePreview.style.display = 'none';
                    fileName.textContent = '';

                    // 恢复初始布局
                    mainContent.classList.remove('input-at-bottom');
                    mainContent.classList.add('input-at-top');
                    introSection.classList.remove('hidden');
                    chatContainer.classList.add('hidden');

                    // 恢复输入框样式
                    const inputContainer = document.querySelector('.input-container');
                    inputContainer.style.borderRadius = '24px';

                    textInput.focus();
                }
            }
        }

        // 事件监听
        sendButton.addEventListener('click', sendMessage);

        textInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        newChatBtn.addEventListener('click', newChat);

        // 初始化
        async function init() {
            textInput.focus();

            // 检查后端状态
            await checkBackendStatus();

            // 每30秒检查一次状态
            setInterval(checkBackendStatus, 30000);

            // 页面可见时检查状态
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    checkBackendStatus();
                }
            });
        }

        // 启动初始化
        init();
    </script>
</body>
</html>
